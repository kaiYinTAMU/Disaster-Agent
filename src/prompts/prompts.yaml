  user_prompt: |
    Question {question_index}: {user_question}
    
    {existing_subquestions_and_subanswers}

  examples:
    - input: |
        Question 1: Analyze the satellite imagery to identify and classify areas affected by a recent natural disaster, such as a flood or wildfire. Provide a detailed description of the scene, including any visible damage to infrastructure or changes in the landscape. Use the high-resolution images available to ensure accurate and comprehensive scene interpretation. Please include the path to the satellite image data in your analysis. The satellite image data is located at '/data/satellite_images/sentinel2_image.tif'. The binary mask array is located at '/data/masks/sentinel2_mask.npy'. The user query file is located at '/data/queries/user_query.txt'.

      output: |
        Question 1.1: How to classify areas affected by a recent natural disaster using satellite image and binary mask?        
        Answer 1.1: The first step is to classify and categorize areas affected by a natural disaster using satellite image and binary mask with the Multi_Spectral_Classifier. This agent will generate reconstructed image with the updated masked regions. The structured task plan is: [{{'agent': 'Multi_Spectral_Classifier', 'step': 0, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'image_path': '/data/satellite_images/sentinel2_image.tif', 'mask_path': '/data/masks/sentinel2_mask.npy'}}, 'outputs': ['reconstructed_image_path', 'feature_representation_path']}}]  
        Question 1.2: How to solve the user queries based on the reconstructed image?        
        Answer 1.2: The second step is to solve the user queries using the reconstructed image. I will use GeoChat to achieve this task. This step is dependent on step 0 and the dependence_content should be {{ "0" : ['reconstructed_image_path']}}. The output reconstructed image path should be provided as an image_path to the GeoChat. The structured task plan is: [{{'agent': 'GeoChat', 'step': 1, 'dependence': [0], 'dependence_content': {{ "0" : ['reconstructed_image_path']}}, 'inputs': {{'image_path': '<GENERATED>-0-<reconstructed_image_path>', 'user_query_path': '/data/queries/user_query.txt'}}, 'outputs': ['contextual_description_path']}}]        
        Question 1.3: Now we can answer the question: Analyze the satellite imagery to identify and classify areas affected by a recent natural disaster, such as a flood or wildfire.        
        Answer 1.3: The comprehensive analysis involves sequentially executing Multi_Spectral_Classifier and GeoChat. The structured task plan is: [{{'agent': 'Multi_Spectral_Classifier', 'step': 0, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'image_path': '/data/satellite_images/sentinel2_image.tif', 'mask_path': '/data/masks/sentinel2_mask.npy'}}, 'outputs': ['reconstructed_image_path', 'feature_representation_path']}}, {{'agent': 'GeoChat', 'step': 1, 'dependence': [0], 'dependence_content': {{ "0" : ['reconstructed_image_path']}}, 'inputs': {{'image_path': '<GENERATED>-0-<reconstructed_image_path>', 'user_query_path': '/data/queries/user_query.txt'}}, 'outputs': ['contextual_description_path']}}]

    - input: |
        Question 2: Assess the impact of a recent disaster on urban infrastructure by analyzing high-resolution satellite images taken before and after the event. Identify and classify the extent of building damage, and detect any anomalies in the urban landscape that may indicate areas of concern. Use the following data paths for the analysis: '/local/data/pre_disaster_image.tif' and '/local/data/post_disaster_image.tif'. The pre-disaster image file '/local/data/pre_disaster_image.tif' contains satellite imagery of the area before the disaster and the post-disaster image file '/local/data/post_disaster_image.tif' contains imagery after the event.
      
      output: |
        Question 2.1: How to assess the impact of a natural disaster on buildings using high-resolution satellite images?        
        Answer 2.1: The first task is analyze the damages to the buildings using pre and post disaster images. The Building_damage_assessment is a great fit for the task because it takes pre_disaster_image_path and post_disaster_image_path to generate a damage classification image map. The structured task plan is: [{{'agent': 'Building_damage_assessment', 'step': 0, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'pre_disaster_image_path': '/local/data/pre_disaster_image.tif', 'post_disaster_image_path': '/local/data/post_disaster_image.tif'}}, 'outputs': ['damage_classification_map_path', 'segmented_buildings_path']}}]      
        Question 2.2: What is required to analyze damages to the urban landscape?
        Answer 2.2: The second task is to analyze urban landscapes using the satellite image with Urban_Anomaly_Detection model. This step does not have any dependence on the previous step, hence the structured plan is: [{{'agent': 'Urban_Anomaly_Detection', 'step': 1, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'image_path': '/local/data/post_disaster_image.tif'}}, 'outputs': ['anomaly_map_path']}}]
        Question 2.3: Now we can answer the question: Assess the impact of a recent disaster on buildings and urban landscape by analyzing high-resolution satellite images taken before and after the event.
        Answer 2.3: The comprehensive analysis involves executing Building_damage_assessment and Urban_Anomaly_Detection. The executions are not dependent on each other. The structured task plan is: [{{'agent': 'Building_damage_assessment', 'step': 0, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'pre_disaster_image_path': '/local/data/pre_disaster_image.tif', 'post_disaster_image_path': '/local/data/post_disaster_image.tif'}}, 'outputs': ['damage_classification_map_path', 'segmented_buildings_path']}}, {{'agent': 'Urban_Anomaly_Detection', 'step': 1, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'image_path': '/local/data/post_disaster_image.tif'}}, 'outputs': ['anomaly_map_path']}}].

