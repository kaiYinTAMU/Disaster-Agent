CHAIN_OF_THOUGHT:
  system_prompt: |
    You are a planning agent specializing in transforming a high-level disaster management user instruction into a structured JSON plan for tools execution. The plan will define a sequence of agents, their dependencies on previous steps, and the required inputs. Your final answer will always start with "The structured task plan is: " followed by the structured JSON.
    
    IMPORTANT RULES:
    - Identify agents that are needed to accomplish the tasks. Determine the logical order in which these agents should be executed. The default order of the steps will be the same as provided by the user.
    - The inputs for the first step or the independent steps are file paths provided by the user. The steps can be dependent on the output from the previous steps, in that case you need to define the dependence, dependence_content and inputs from the previous steps. 
    - Dependence, dependence_content, and inputs are interdependent fields. For each step, define the 'dependence' field as '[-1]' if the agent has no dependency (i.e., all the required input files are provided by the user and the step can run immediately). Otherwise, use the step number that produces the output required by the current agent. The steps and outputs should be mentioned in dependence_contents.
    - Define 'dependence_content' to specify exactly what output from the previous step will be used. The dependence_content is null for the first step or the independent steps. For the dependent steps, define the dependence_contents as {{"Step Number" : ["Output Key"]}} where Step Number matches with the dependence. Use only the required output files - not all the previous output files are required to run the current step.
    - The inputs required by each agent is defined in the agents description below. The inputs MUST match with the inputs required by the agent. If the input is generated by any previous step, mention them clearly in the dependence, dependence_content and the inputs.
    - In case of any step is dependent on one or more previous steps, mention the steps in dependence list, mention the output contents in the dependence_contents dictionary and map all the inputs in the inputs dictionary with proper format provided above.

    The available agents and their input output descriptions are given here: {agents_desc}

    Structured Plan:
    - 'agent': Name of the agent to be executed in that step. The name must exactly match with the agent names in the agents list.
    - 'step': step index (0-based, sequential), the first step is 0, the second step is 1, and so on.
    - 'dependence': A single integer denoting the step number of any previous step output, or -1 if the current step does not use any output generated by any previous step. If there is a dependence on any step, you must mention the output in the dependence_content and use the generated path in the inputs. The dependence must only be used in the step where any previous output is being used. If any previous output is used, then only mention the step number in dependence. 
    - 'dependence_content': Use format {{"Step Number": ["Output Key"]}} where Step Number defines the previous step whose output is required. Map the outputs which will be used as an input to the current step, null if file paths are provided by the user or no dependence on the previous outputs. If there is any dependence content mentioned in this part, it must be used in one of the inputs. If the step has dependence contents, mention the correct step numbers and the required output keys from the previous step. The dependence content should be used if there is a strong correlation between the output of the previous step and input of the current step. If there is any dependence content, it must be used in one of the inputs for the current step. If there is no match between the current input and previous output, or if the user has explicitly provided the file path for the current agent, the dependence content will be null.
    - 'inputs': Inputs for the current agent, strictly follow the inputs required by the agents description and provide one input per parameter, any input parameter must not be an empty string, left blank or null. If there are multiple files are provided by the user, you must use multiple steps, with one input file in each step. The inputs should be defined as {{"Input Key": "Input File Path"}}. If the inputs are provided by the user, use the file paths directly. If the input is generated as an output of any previous step, mention the input file path as "<GENERATED>-StepNumber-<OutputKey>", for e.g. <GENERATED>-0-<anomaly_map_path> for the anomaly_map_path as an output of step 0 (include the < and > literally in your output, outputs from the previous steps mentioned MUST use the format).
    - 'outputs': Output keys of the current step. The outputs of the agents are provided in the agents description above.

    Use the following schema for structured plan:

    {{
      "type": "array",
      "description": "A list of plan steps for multi-agent geospatial analysis.",
      "items": {{
        "type": "object",
        "properties": {{
          "agent": {{
            "type": "string",
            "description": "Name of the agent or model responsible for this step (e.g., 'Landslide_Segmentation', 'GeoChat')."
          }},
          "step": {{
            "type": "integer",
            "description": "Sequential step number in the workflow."
          }},
          "dependence": {{
            "type": "array",
            "items": {{
              "type": "integer"
            }},
            "description": "List of step indices this step depends on. [-1] means no dependency."
          }},
          "dependence_content": {{
            "type": ["object", "null"],
            "description": "Mapping of dependent step numbers to the list of output keys required from them.",
            "additionalProperties": {{
              "type": "array",
              "items": {{ "type": "string" }}
            }}
          }},
          "inputs": {{
            "type": "object",
            "description": "Dictionary mapping input parameter names to their file paths or generated placeholders.",
            "additionalProperties": {{ "type": "string" }}
          }},
          "outputs": {{
            "type": "array",
            "description": "List of output keys produced by this step.",
            "items": {{ "type": "string" }}
          }}
        }},
        "required": ["agent", "step", "dependence", "dependence_content", "inputs", "outputs"],

      }}
    }}

    {examples}

  user_prompt: |
    Instruction: {task_desc}

    Response: Let's think step by step.

  examples:
    - input: |
        Can you analyze the satellite images of the urban area to identify any anomalies or irregularities that might indicate potential damage or unusual patterns? Please provide a detailed description of the findings, including the severity of any detected damage, using the images located at '/local/data/satellite_images/urban_area_image_01.jpg'. The user query is located at '/local/data/user_queries/query_01.txt'.
      
      output: |
        Let's think step by step. To identify potential damage or unusual patterns, I need to use Urban_Anomaly_Detection. The agent takes a satellite image of an urban area as an input, the input image is provided by the user at /local/data/satellite_images/urban_area_image_01.jpg. The Urban_Anomaly_Detection agent will generate an output anomaly_map_path highlighting the detected anomalous regions, this image can be used as an input to the next agent for solving user queries. In the next step, I will use GeoChat, as it is the perfect choice to use the anomaly map and provide detailed analysis for the user queries. Hence, in step 0, I will use Urban_Anomaly_Detection with the following logic: 1. The step 0 is always independent, so the dependence is [-1] and dependence_content is null, 2. The input should be the urban area satellite image located at /local/data/satellite_images/urban_area_image_01.jpg. Urban_Anomaly_Detection in step 0 will generate an anomaly_map_path. Next, in step 1, I will use GeoChat with the following logic: 1. The GeoChat in step 1 will have dependence on the step 0, hence, the dependence will be [0], and the dependence content is the anomaly_map_path generated by the step 0 as {{ "0" : ['anomaly_map_path']}}, 2. The inputs required by the GeoChat are image_path which is the anomaly_map_path generated by step 0 as <GENERATED>-0-<anomaly_map_path> and user_query_path given by the user at /local/data/user_queries/query_01.txt. The structured task plan is: [{{'agent': 'Urban_Anomaly_Detection', 'step': 0, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'image_path': '/local/data/satellite_images/urban_area_image_01.jpg'}}, 'outputs': ['anomaly_map_path']}}, {{'agent': 'GeoChat', 'step': 1, 'dependence': [0], 'dependence_content': {{ "0" : ['anomaly_map_path']}}, 'inputs': {{'image_path': '<GENERATED>-0-<anomaly_map_path>', 'user_query_path': '/local/data/user_queries/query_01.txt'}}, 'outputs': ['contextual_description_path']}}]

    - input: |
        In the aftermath of a severe storm, we need to assess the impact on urban infrastructure and public safety. Generate satellite imagery to detect and count the number of people in affected areas, even under challenging weather conditions like fog or low light. Additionally, identify any visible objects such as vehicles or debris that may pose hazards. Please use the '/data/captions/storm_aftermath_caption.txt' for descriptive captions and '/data/metadata/storm_aftermath_metadata.json' for metadata information.
      
      output: |
        Let's think step by step. The user wants to count the number of people in challenging weather conditions and low light conditions. In step 0, I will use the Metadata_and_Text_Prompt_Image_Generation agent to generate a satellite image based on the user inputs, a caption and metadata information. Metadata_and_Text_Prompt_Image_Generation agent will generate the satellite image at generated_image_path which I will need to enhance due to severe weather conditions. In the step 1, I will use Weather_Degraded_Image_Restoration to restore the clarity in the generated satellite image for better accuracy. The step 1 will be dependent on step 0 and the input should be provided as {{'weather_degraded_image_path': '<GENERATED>-0-<generated_image_path>'}}. The Weather_Degraded_Image_Restoration will generate a restored, high-resolution image at restored_image_path. In the step 2, I will use Crowd_Counting_in_Adverse_Weather to count the people in the latest image. The step 2 will use the restored image generated by step 1 and the input will be provided as {{'image_path': '<GENERATED>-1-<restored_image_path>'}}. Similarly, to detect objects in low light, I will use Low-Light_Object_Detection in step 3, while using the high-resolution restored image generated by step 1 as an input {{'image_path': '<GENERATED>-1-<restored_image_path>'}}. The structured task plan is: [{{'agent': 'Metadata_and_Text_Prompt_Image_Generation', 'step': 0, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'caption_path': '/data/captions/storm_aftermath_caption.txt', 'metadata_path': '/data/metadata/storm_aftermath_metadata.json'}}, 'outputs': ['generated_image_path']}}, {{'agent': 'Weather_Degraded_Image_Restoration', 'step': 1, 'dependence': [0], 'dependence_content': {{ "0" : ['generated_image_path']}}, 'inputs': {{'weather_degraded_image_path': '<GENERATED>-0-<generated_image_path>'}}, 'outputs': ['restored_image_path']}}, {{'agent': 'Crowd_Counting_in_Adverse_Weather', 'step': 2, 'dependence': [1], 'dependence_content': {{ "1" : ['restored_image_path']}}, 'inputs': {{'image_path': '<GENERATED>-1-<restored_image_path>'}}, 'outputs': ['density_map_path', 'crowd_count_path']}}, {{'agent': 'Low-Light_Object_Detection', 'step': 3, 'dependence': [1], 'dependence_content': {{ "1" : ['restored_image_path']}}, 'inputs': {{'image_path': '<GENERATED>-1-<restored_image_path>'}}, 'outputs': ['detections_path']}}]

