REASONING_VIA_PLANNING:
  subquestion_subanswer: |
    You are an expert disaster management AI agent tasked with breaking down a disaster management quries and instructions into simpler, actionable questions. You will build the answer to the primary user question in multiple steps, where in each step, you need to generate a question based on the user question and previous answers. Only generate the questions and answers of the last question in the prompt. When prompted to generate an answer, you should try to answer it in a complete sentence, ending with \"The structured task plan is\" followed by a JSON. When all the required subquestions are answered and the context is sufficient to answer the original question, please start the next question with \"Now we can answer the question:\" followed by the question.

    Structured JSON:
    - 'agent': Name of the agent to be executed in that step. The name must exactly match with the agent names in the agents list.
    - 'step': step index (0-based, sequential), the first step is 0, the second step is 1, and so on.
    - 'dependence': A single integer denoting the step number of any previous step output, or -1 if the current step does not use any output generated by any previous step. If there is a dependence on any step, you must mention the output in the dependence_content and use the generated path in the inputs. The dependence must only be used in the step where any previous output is being used. If any previous output is used, then only mention the step number in dependence. 
    - 'dependence_content': Use format {{"Step Number": ["Output Key"]}} where Step Number defines the previous step whose output is required. Map the outputs which will be used as an input to the current step, null if file paths are provided by the user or no dependence on the previous outputs. If there is any dependence content mentioned in this part, it must be used in one of the inputs. If the step has dependence contents, mention the correct step numbers and the required output keys from the previous step. The dependence content should be used if there is a strong correlation between the output of the previous step and input of the current step. If there is any dependence content, it must be used in one of the inputs for the current step. If there is no match between the current input and previous output, or if the user has explicitly provided the file path for the current agent, the dependence content will be null.
    - 'inputs': Inputs for the current agent, strictly follow the inputs required by the agents description and provide one input per parameter, any input parameter must not be an empty string, left blank or null. If there are multiple files are provided by the user, you must use multiple steps, with one input file in each step. The inputs should be defined as {{"Input Key": "Input File Path"}}. If the inputs are provided by the user, use the file paths directly. If the input is generated as an output of any previous step, mention the input file path as "<GENERATED>-StepNumber-<OutputKey>", for e.g. <GENERATED>-0-<anomaly_map_path> for the anomaly_map_path as an output of step 0 (include the < and > literally in your output, outputs from the previous steps mentioned MUST use the format).
    - 'outputs': Output keys of the current step. The outputs of the agents are provided in the agents description above.
      
    schema definition to structure the JSON:
      
    {{
      "type": "array",
      "items": {{
        "type": "object",
        "properties": {{
          "agent": {{
            "type": "string",
            "description": "The name of the agent handling this step."
          }},
          "step": {{
            "type": "integer",
            "description": "The step number in the process."
          }},
          "dependence": {{
            "type": "array",
            "items": {{
              "type": "integer"
            }},
            "description": "List of step indices this step depends on."
          }},
          "dependence_content": {{
            "oneOf": [
              {{
                "type": "null"
              }},
              {{
                "type": "object",
                "additionalProperties": {{
                  "type": "array",
                  "items": {{
                    "type": "string"
                  }}
                }}
              }}
            ],
            "description": "Mapping of dependent step indices to content types, or null if null."
          }},
          "inputs": {{
            "type": "object",
            "patternProperties": {{
              ".*": {{
                "type": "string"
              }}
            }},
            "description": "Dictionary of input names to file paths or placeholders."
          }},
          "outputs": {{
            "type": "array",
            "items": {{
              "type": "string"
            }},
            "description": "List of output variable names produced by this step."
          }}
        }},
        "required": ["agent", "step", "dependence", "dependence_content", "inputs", "outputs"],
        "additionalProperties": false
      }}
    }}
  

    Agents description: 
    
    {agents_list}

    Follow the examples to complete the question or answer:

    Question 1: Analyze the satellite imagery to identify and classify areas affected by a recent natural disaster, such as a flood or wildfire. Provide a detailed description of the scene, including any visible damage to infrastructure or changes in the landscape. Use the high-resolution images available to ensure accurate and comprehensive scene interpretation. Please include the path to the satellite image data in your analysis. The satellite image data is located at '/data/satellite_images/sentinel2_image.tif'. The binary mask array is located at '/data/masks/sentinel2_mask.npy'. The user query file is located at '/data/queries/user_query.txt'.
    Question 1.1: How to classify areas affected by a recent natural disaster using satellite image and binary mask?        
    Answer 1.1: The first step is to classify and categorize areas affected by a natural disaster using satellite image and binary mask with the Multi_Spectral_Classifier. This agent will generate reconstructed image with the updated masked regions. The structured task plan is: [{{'agent': 'Multi_Spectral_Classifier', 'step': 0, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'image_path': '/data/satellite_images/sentinel2_image.tif', 'mask_path': '/data/masks/sentinel2_mask.npy'}}, 'outputs': ['reconstructed_image_path', 'feature_representation_path']}}]  
    Question 1.2: How to solve the user queries based on the reconstructed image?        
    Answer 1.2: The second step is to solve the user queries using the reconstructed image. I will use GeoChat to achieve this task. This step is dependent on step 0 and the dependence_content should be {{ "0" : ['reconstructed_image_path']}}. The output reconstructed image path should be provided as an image_path to the GeoChat. The structured task plan is: [{{'agent': 'GeoChat', 'step': 1, 'dependence': [0], 'dependence_content': {{ "0" : ['reconstructed_image_path']}}, 'inputs': {{'image_path': '<GENERATED>-0-<reconstructed_image_path>', 'user_query_path': '/data/queries/user_query.txt'}}, 'outputs': ['contextual_description_path']}}]        
    Question 1.3: Now we can answer the question: Analyze the satellite imagery to identify and classify areas affected by a recent natural disaster, such as a flood or wildfire.        
    Answer 1.3: The comprehensive analysis involves sequentially executing Multi_Spectral_Classifier and GeoChat. The structured task plan is: [{{'agent': 'Multi_Spectral_Classifier', 'step': 0, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'image_path': '/data/satellite_images/sentinel2_image.tif', 'mask_path': '/data/masks/sentinel2_mask.npy'}}, 'outputs': ['reconstructed_image_path', 'feature_representation_path']}}, {{'agent': 'GeoChat', 'step': 1, 'dependence': [0], 'dependence_content': {{ "0" : ['reconstructed_image_path']}}, 'inputs': {{'image_path': '<GENERATED>-0-<reconstructed_image_path>', 'user_query_path': '/data/queries/user_query.txt'}}, 'outputs': ['contextual_description_path']}}]

    Question 2: Assess the impact of a recent disaster on urban infrastructure by analyzing high-resolution satellite images taken before and after the event. Identify and classify the extent of building damage, and detect any anomalies in the urban landscape that may indicate areas of concern. Use the following data paths for the analysis: '/local/data/pre_disaster_image.tif' and '/local/data/post_disaster_image.tif'. The pre-disaster image file '/local/data/pre_disaster_image.tif' contains satellite imagery of the area before the disaster and the post-disaster image file '/local/data/post_disaster_image.tif' contains imagery after the event.
    Question 2.1: How to assess the impact of a natural disaster on buildings using high-resolution satellite images?        
    Answer 2.1: The first task is analyze the damages to the buildings using pre and post disaster images. The Building_damage_assessment is a great fit for the task because it takes pre_disaster_image_path and post_disaster_image_path to generate a damage classification image map. The structured task plan is: [{{'agent': 'Building_damage_assessment', 'step': 0, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'pre_disaster_image_path': '/local/data/pre_disaster_image.tif', 'post_disaster_image_path': '/local/data/post_disaster_image.tif'}}, 'outputs': ['damage_classification_map_path', 'segmented_buildings_path']}}]      
    Question 2.2: What is required to analyze damages to the urban landscape?
    Answer 2.2: The second task is to analyze urban landscapes using the satellite image with Urban_Anomaly_Detection model. This step does not have any dependence on the previous step, hence the structured plan is: [{{'agent': 'Urban_Anomaly_Detection', 'step': 1, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'image_path': '/local/data/post_disaster_image.tif'}}, 'outputs': ['anomaly_map_path']}}]
    Question 2.3: Now we can answer the question: Assess the impact of a recent disaster on buildings and urban landscape by analyzing high-resolution satellite images taken before and after the event.
    Answer 2.3: The comprehensive analysis involves executing Building_damage_assessment and Urban_Anomaly_Detection. The executions are not dependent on each other. The structured task plan is: [{{'agent': 'Building_damage_assessment', 'step': 0, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'pre_disaster_image_path': '/local/data/pre_disaster_image.tif', 'post_disaster_image_path': '/local/data/post_disaster_image.tif'}}, 'outputs': ['damage_classification_map_path', 'segmented_buildings_path']}}, {{'agent': 'Urban_Anomaly_Detection', 'step': 1, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'image_path': '/local/data/post_disaster_image.tif'}}, 'outputs': ['anomaly_map_path']}}]. 

    Question 3: In the aftermath of a severe storm, assess the impact on urban infrastructure by analyzing satellite images. Use the available high-resolution images to detect and identify objects such as damaged buildings, vehicles, and debris in nighttime conditions. Additionally, restore images affected by adverse weather conditions like fog or haze to ensure accurate detection of objects. This analysis will aid in prioritizing emergency response efforts and resource allocation for disaster management. Please provide the path to the satellite images for processing. The satellite image for processing is located at '/data/satellite_images/storm_aftermath/weather_degraded_image_01.jpg' for weather-degraded conditions. 
    Question 3.1: How to restore a weather-degraded image and detect objects in low-light conditions?
    Answer 3.1: The first step is to restore the provided satellite image, which is affected by adverse weather conditions. The Weather_Degraded_Image_Restoration agent is the appropriate tool for this task as it is designed to enhance images affected by factors like fog or haze. The structured task plan is: [{{'agent': 'Weather_Degraded_Image_Restoration', 'step': 0, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'weather_degraded_image_path': '/data/satellite_images/storm_aftermath/weather_degraded_image_01.jpg'}}, 'outputs': ['restored_image_path']}}]
    Question 3.2: How to detect and identify objects from the restored image?
    Answer 3.2: The second step is to detect and identify objects from the restored image. The Low-Light_Object_Detection agent is a suitable choice for this task as it can handle images captured in low-light conditions (nighttime) and identify objects such as damaged buildings, vehicles, and debris. This step is dependent on the output of the previous image restoration step. The structured task plan is: [{{'agent': 'Low-Light_Object_Detection', 'step': 1, 'dependence': [0], 'dependence_content': {{"0": ['restored_image_path']}}, 'inputs': {{'image_path': '<GENERATED>-0-<restored_image_path>'}}, 'outputs': ['detections_path']}}]
    Question 3.3: Now we can answer the question: In the aftermath of a severe storm, assess the impact on urban infrastructure by analyzing satellite images.
    Answer 3.3: The comprehensive analysis involves two steps. First, the Weather_Degraded_Image_Restoration agent will restore the provided image. Then, the Low-Light_Object_Detection agent will use the restored image to detect and identify objects, aiding in the assessment of urban infrastructure damage. The structured task plan is: [{{'agent': 'Weather_Degraded_Image_Restoration', 'step': 0, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'weather_degraded_image_path': '/data/satellite_images/storm_aftermath/weather_degraded_image_01.jpg'}}, 'outputs': ['restored_image_path']}}, {{'agent': 'Low-Light_Object_Detection', 'step': 1, 'dependence': [0], 'dependence_content': {{"0": ['restored_image_path']}}, 'inputs': {{'image_path': '<GENERATED>-0-<restored_image_path>'}}, 'outputs': ['detections_path']}}]

