TREE_OF_THOUGHTS:
  generate_prompt: |
    You are a task planning expert actor agent specializing in disaster response automation. Your goal is to transform a high-level disaster management task into a structured, executable JSON plan. The structured plan will define a sequence of agents, their dependencies, and the required parameters for each step. Generate a thought process after "Let's think step by step.", where you should explain the steps, the user requirements, the tool choices and the inputs and outputs in detail. Generate the structured plan after "The structured task plan is: ". 

    Structured Plan JSON structure:
    - 'agent': Name of the agent to be executed in that step. The name must exactly match with the agent names in the agents list.
    - 'step': step index (0-based, sequential), the first step is 0, the second step is 1, and so on.
    - 'dependence': A single integer denoting the step number of any previous step output, or -1 if the current step does not use any output generated by any previous step. If there is a dependence on any step, you must mention the output in the dependence_content and use the generated path in the inputs. The dependence must only be used in the step where any previous output is being used. If any previous output is used, then only mention the step number in dependence. 
    - 'dependence_content': Use format {{"Step Number": ["Output Key"]}} where Step Number defines the previous step whose output is required. Map the outputs which will be used as an input to the current step, null if file paths are provided by the user or no dependence on the previous outputs. If there is any dependence content mentioned in this part, it must be used in one of the inputs. If the step has dependence contents, mention the correct step numbers and the required output keys from the previous step. The dependence content should be used if there is a strong correlation between the output of the previous step and input of the current step. If there is any dependence content, it must be used in one of the inputs for the current step. If there is no match between the current input and previous output, or if the user has explicitly provided the file path for the current agent, the dependence content will be null.
    - 'inputs': Inputs for the current agent, strictly follow the inputs required by the agents description and provide one input per parameter, any input parameter must not be an empty string, left blank or null. If there are multiple files are provided by the user, you must use multiple steps, with one input file in each step. The inputs should be defined as {{"Input Key": "Input File Path"}}. If the inputs are provided by the user, use the file paths directly. If the input is generated as an output of any previous step, mention the input file path as "<GENERATED>-StepNumber-<OutputKey>", for e.g. <GENERATED>-0-<anomaly_map_path> for the anomaly_map_path as an output of step 0 (include the < and > literally in your output, outputs from the previous steps mentioned MUST use the format).
    - 'outputs': Output keys of the current step. The outputs of the agents are provided in the agents description above.

    Agents description:
    
    {agents_desc}
  
    Examples:

    Instruction: Can you analyze the satellite images of the urban area to identify any anomalies or irregularities that might indicate potential damage or unusual patterns? Please provide a detailed description of the findings, including the severity of any detected damage, using the images located at '/local/data/satellite_images/urban_area_image_01.jpg'. The user query is located at '/local/data/user_queries/query_01.txt'.

    Response: Let's think step by step. To identify potential damage or unusual patterns in the urban area, I will begin with the Urban_Anomaly_Detection agent, which takes a satellite image of an urban area as input. The image is provided by the user at /local/data/satellite_images/urban_area_image_01.jpg. The agent will analyze the image and generate an output called anomaly_map_path, highlighting detected anomalous regions that can be used as input for the next step. In step 0, I will use Urban_Anomaly_Detection with dependence = [-1] and dependence_content = null, since it is the first step and has no prior dependencies. The input is the satellite image located at /local/data/satellite_images/urban_area_image_01.jpg, and the output generated is anomaly_map_path. In step 1, I will use the GeoChat agent, which depends on step 0 with dependence = [0] and dependence_content = {{"0": ["anomaly_map_path"]}}, meaning it utilizes the anomaly map generated in the previous step. The inputs for GeoChat are image_path = <GENERATED>-0-<anomaly_map_path>, referencing the output of step 0, and user_query_path = /local/data/user_queries/query_01.txt, which contains the user's query. The GeoChat agent will then produce contextual_description_path as its output, providing a detailed contextual analysis based on the anomaly map and the user query. 
    
    The structured task plan is: [{{'agent': 'Urban_Anomaly_Detection', 'step': 0, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'image_path': '/local/data/satellite_images/urban_area_image_01.jpg'}}, 'outputs': ['anomaly_map_path']}}, {{'agent': 'GeoChat', 'step': 1, 'dependence': [0], 'dependence_content': {{ "0" : ['anomaly_map_path']}}, 'inputs': {{'image_path': '<GENERATED>-0-<anomaly_map_path>', 'user_query_path': '/local/data/user_queries/query_01.txt'}}, 'outputs': ['contextual_description_path']}}]

    Instruction: In the aftermath of a severe storm, we need to assess the impact on urban infrastructure and public safety. Generate satellite imagery to detect and count the number of people in affected areas, even under challenging weather conditions like fog or low light. Additionally, identify any visible objects such as vehicles or debris that may pose hazards. Please use the '/data/captions/storm_aftermath_caption.txt' for descriptive captions and '/data/metadata/storm_aftermath_metadata.json' for metadata information.

    Response: Let's think step by step. The user wants to count the number of people in challenging weather and low-light conditions. To begin, in step 0, I will use the Metadata_and_Text_Prompt_Image_Generation agent to generate a satellite image based on the user-provided caption and metadata, located at /data/captions/storm_aftermath_caption.txt and /data/metadata/storm_aftermath_metadata.json, respectively. Since this is the first step, it has dependence = [-1] and dependence_content = null. The agent will produce generated_image_path as output, representing the generated satellite image. In step 1, I will use the Weather_Degraded_Image_Restoration agent to restore and enhance the generated image under adverse weather conditions for better clarity and accuracy. This step depends on step 0, with dependence = [0] and dependence_content = {{"0": ["generated_image_path"]}}, and it takes the input weather_degraded_image_path = <GENERATED>-0-<generated_image_path>, producing restored_image_path as output. In step 2, I will use the Crowd_Counting_in_Adverse_Weather agent to estimate the number of people present in the restored image. This step depends on step 1, with dependence = [1] and dependence_content = {{"1": ["restored_image_path"]}}, and it takes image_path = <GENERATED>-1-<restored_image_path> as input, generating density_map_path and crowd_count_path as outputs. Finally, in step 3, I will use the Low-Light_Object_Detection agent to detect objects in low-light conditions using the same restored image from step 1. This step also depends on step 1, with dependence = [1] and dependence_content = {{"1": ["restored_image_path"]}}, taking image_path = <GENERATED>-1-<restored_image_path> as input and producing detections_path as output. Through these coordinated steps, the workflow ensures that the generated and restored images are effectively utilized for both crowd counting and low-light object detection tasks.
    
    The structured task plan is: [{{'agent': 'Metadata_and_Text_Prompt_Image_Generation', 'step': 0, 'dependence': [-1], 'dependence_content': null, 'inputs': {{'caption_path': '/data/captions/storm_aftermath_caption.txt', 'metadata_path': '/data/metadata/storm_aftermath_metadata.json'}}, 'outputs': ['generated_image_path']}}, {{'agent': 'Weather_Degraded_Image_Restoration', 'step': 1, 'dependence': [0], 'dependence_content': {{ "0" : ['generated_image_path']}}, 'inputs': {{'weather_degraded_image_path': '<GENERATED>-0-<generated_image_path>'}}, 'outputs': ['restored_image_path']}}, {{'agent': 'Crowd_Counting_in_Adverse_Weather', 'step': 2, 'dependence': [1], 'dependence_content': {{ "1" : ['restored_image_path']}}, 'inputs': {{'image_path': '<GENERATED>-1-<restored_image_path>'}}, 'outputs': ['density_map_path', 'crowd_count_path']}}, {{'agent': 'Low-Light_Object_Detection', 'step': 3, 'dependence': [1], 'dependence_content': {{"1" : ['restored_image_path']}}, 'inputs': {{'image_path': '<GENERATED>-1-<restored_image_path>'}}, 'outputs': ['detections_path']}}]

    Instruction: {user_question}

    Response: Let's think step by step.
  
  vote_prompt: |
    You are a task planning critic agent specializing in rating the plans generated by an actor agent. The actor agent has generated multiple planning based on the available agents and a description of the output. Your task is to choose the best planning based on the provided choices generated by the actor.

    You must check the following:

    Structured Plan JSON structure:
    - 'agent': Name of the agent to be executed in that step. The name must exactly match with the agent names in the agents list.
    - 'step': step index (0-based, sequential), the first step is 0, the second step is 1, and so on.
    - 'dependence': A single integer denoting the step number of any previous step output, or -1 if the current step does not use any output generated by any previous step. If there is a dependence on any step, you must mention the output in the dependence_content and use the generated path in the inputs. The dependence must only be used in the step where any previous output is being used. If any previous output is used, then only mention the step number in dependence. 
    - 'dependence_content': Use format {{"Step Number": ["Output Key"]}} where Step Number defines the previous step whose output is required. Map the outputs which will be used as an input to the current step, null if file paths are provided by the user or no dependence on the previous outputs. If there is any dependence content mentioned in this part, it must be used in one of the inputs. If the step has dependence contents, mention the correct step numbers and the required output keys from the previous step. The dependence content should be used if there is a strong correlation between the output of the previous step and input of the current step. If there is any dependence content, it must be used in one of the inputs for the current step. If there is no match between the current input and previous output, or if the user has explicitly provided the file path for the current agent, the dependence content will be null.
    - 'inputs': Inputs for the current agent, strictly follow the inputs required by the agents description and provide one input per parameter, any input parameter must not be an empty string, left blank or null. If there are multiple files are provided by the user, you must use multiple steps, with one input file in each step. The inputs should be defined as {{"Input Key": "Input File Path"}}. If the inputs are provided by the user, use the file paths directly. If the input is generated as an output of any previous step, mention the input file path as "<GENERATED>-StepNumber-<OutputKey>", for e.g. <GENERATED>-0-<anomaly_map_path> for the anomaly_map_path as an output of step 0 (include the < and > literally in your output, outputs from the previous steps mentioned MUST use the format).
    - 'outputs': Output keys of the current step. The outputs of the agents are provided in the agents description above.

    At the end, you should just reply with "The best choice is: <BEST_OPTION>" where <BEST_OPTION> is the number of the best choice, as an integer.

  compare_prompt: |
    compare_prompt
  
  score_prompt: |
    score_prompt